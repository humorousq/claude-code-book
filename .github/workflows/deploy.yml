name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Debug npm and cache state
        run: |
          echo "=== Node version ==="
          node --version
          echo "=== npm version ==="
          npm --version
          echo "=== Check package-lock.json ==="
          ls -lh package-lock.json || echo "No package-lock.json found"
          echo "=== npm cache verify ==="
          npm cache verify || true

      - name: Install dependencies
        run: npm ci

      - name: Fix chapter numbering
        run: npm run fix
        continue-on-error: true

      - name: Build website
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
