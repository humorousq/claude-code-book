name: Release PDF

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Fix chapter numbering
        run: npm run fix

      - name: Build website
        run: npm run build

      - name: Generate PDF
        run: npm run pdf

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 📚 Claude Code 实战工作流指南 ${{ steps.get_version.outputs.VERSION }}

            ### 下载
            - 📄 [PDF 版本](Claude-Code-实战工作流指南.pdf)
            - 🌐 [在线阅读](https://username.github.io/claude-code-book/)

            ### 更新内容
            请查看 [CHANGELOG.md](CHANGELOG.md)
          files: pdf-output/*.pdf
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
